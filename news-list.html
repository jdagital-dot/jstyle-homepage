    <script>
        // ハンバーガーメニュー
        const hamburger = document.getElementById('hamburger');
        const mainNav = document.getElementById('main-nav');
        if (hamburger && mainNav) {
            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('open');
                mainNav.classList.toggle('open');
                hamburger.setAttribute('aria-expanded', mainNav.classList.contains('open'));
            });
            mainNav.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    hamburger.classList.remove('open');
                    mainNav.classList.remove('open');
                    hamburger.setAttribute('aria-expanded', 'false');
                });
            });
        }

        const { serviceDomain: MICROCMS_SERVICE_DOMAIN, apiKey: MICROCMS_API_KEY } = window.JSTYLE_CONFIG.microcms;
        const newsContainer = document.getElementById('all-news-container');

        function escapeHtml(str) {
            return String(str ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;');
        }

        async function fetchAllNews() {
            try {
                const response = await fetch(
                    `https://${MICROCMS_SERVICE_DOMAIN}.microcms.io/api/v1/news?limit=50`,
                    { headers: { 'X-MICROCMS-API-KEY': MICROCMS_API_KEY } }
                );
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                renderNews(data.contents);
            } catch (error) {
                console.error('取得失敗:', error);
                newsContainer.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        <p>読み込みに失敗しました。<br>しばらく経ってから再度お試しください。</p>
                    </div>`;
            }
        }

        function renderNews(contents) {
            newsContainer.innerHTML = '';
            if (!contents || contents.length === 0) {
                newsContainer.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        <p>ニュースはまだありません。</p>
                    </div>`;
                return;
            }

            contents.forEach((content, i) => {
                const date = new Date(content.publishedAt || content.createdAt);
                const formattedDate = `${date.getFullYear()}.${(date.getMonth() + 1).toString().padStart(2, '0')}.${date.getDate().toString().padStart(2, '0')}`;

                const card = document.createElement('article');
                card.className = 'news-card reveal';
                card.style.animationDelay = `${i * 60}ms`;
                card.setAttribute('tabindex', '0');
                card.setAttribute('role', 'button');
                card.setAttribute('aria-label', content.title);

                const imageHtml = content.image
                    ? `<div class="news-image"><img src="${escapeHtml(content.image.url)}" alt="${escapeHtml(content.title)}" loading="lazy" width="400" height="225"></div>`
                    : '';

                card.innerHTML = `
                    ${imageHtml}
                    <div class="news-content">
                        <span class="news-date">${formattedDate}</span>
                        <span class="news-tag">${escapeHtml(content.category || 'お知らせ')}</span>
                        <h3 class="news-title">${escapeHtml(content.title)}</h3>
                    </div>
                `;

                const goToDetail = () => {
                    window.location.href = `news-detail.html?id=${encodeURIComponent(content.id)}`;
                };
                card.addEventListener('click', goToDetail);
                card.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        goToDetail();
                    }
                });

                newsContainer.appendChild(card);
            });

            // スクロールアニメ
            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry, i) => {
                    if (entry.isIntersecting) {
                        setTimeout(() => entry.target.classList.add('active'), i * 60);
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        fetchAllNews();
    </script>
