<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEWS | J.STYLE</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap"
        rel="stylesheet">
</head>

<body class="news-detail-page">
    <header class="main-header" style="background: rgba(5, 5, 16, 0.95);">
        <div class="header-inner">
            <h1 class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">J.STYLE</a></h1>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html#news">NEWS</a></li>
                    <li><a href="index.html#about">ABOUT</a></li>
                    <li><a href="index.html#courses">COURSES</a></li>
                    <li><a href="index.html#staff">STAFF</a></li>
                    <li><a href="index.html#access">ACCESS</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container" style="padding-top: 150px; padding-bottom: 100px; max-width: 800px;">
        <div id="news-content-area" class="reveal">
            <!-- ここに中身が自動で入ります -->
            <p style="text-align: center; color: var(--text-dim);">読み込み中...</p>
        </div>

        <div style="margin-top: 60px; text-align: center;">
            <a href="index.html#news" class="btn btn-outline">ニュース一覧に戻る</a>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p class="copyright">© 2026 J.STYLE. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const MICROCMS_SERVICE_DOMAIN = 'j-style-news'; // あなたのサービスドメイン
        const MICROCMS_API_KEY = 'nuAX2PFCPxRVLB5iRw37iYoQQ5ugY6ncWLHZ'; // あなたのAPIキー

        async function fetchDetail() {
            // URLから ?id=xxxxx の部分を取得
            const params = new URLSearchParams(window.location.search);
            const contentId = params.get('id');

            if (!contentId) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const response = await fetch(
                    `https://${MICROCMS_SERVICE_DOMAIN}.microcms.io/api/v1/news/${contentId}`,
                    {
                        headers: { 'X-MICROCMS-API-KEY': MICROCMS_API_KEY }
                    }
                );
                const data = await response.json();
                renderDetail(data);
            } catch (error) {
                console.error('取得失敗:', error);
                document.getElementById('news-content-area').innerHTML = '<p style="color:red;">記事の読み込みに失敗しました。</p>';
            }
        }

        function renderDetail(data) {
            const date = new Date(data.publishedAt || data.createdAt);
            const formattedDate = `${date.getFullYear()}.${(date.getMonth() + 1).toString().padStart(2, '0')}.${date.getDate().toString().padStart(2, '0')}`;

            // ページタイトルとMETA情報を動的に変更（SEO対策）
            document.title = `${data.title} | J.STYLE`;

            const imgHtml = data.image
                ? `<img src="${data.image.url}" style="width:100%; border-radius:20px; margin-bottom:40px;" alt="${data.title}">`
                : '';

            document.getElementById('news-content-area').innerHTML = `
                <div class="modal-header">
                    <span class="modal-date">${formattedDate}</span>
                    <h1 class="modal-title" style="font-size: 2.5rem; margin: 15px 0 30px;">${data.title}</h1>
                </div>
                ${imgHtml}
                <div class="modal-body" style="font-size: 1.1rem; line-height: 2;">
                    ${data.text || data.content || data.body || '内容がありません。'}
                </div>
            `;

            // 表示のアニメーション
            document.getElementById('news-content-area').classList.add('active');
        }

        fetchDetail();
    </script>
</body>

</html>
